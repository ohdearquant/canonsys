[project]
name = "canon-vocab-data-protection"
version = "2026.01.0"
description = "Data classification, encryption, minimization, purpose limitation, and retention compliance."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@canonsys.com" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_data_protection"]
