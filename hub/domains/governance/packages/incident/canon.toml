# Canon Vocabulary Package Manifest

[package]
name = "incident"
version = "2026.01"
description = "Incident declaration, containment verification, and root cause identification."

[package.regulatory]
basis = [
    "GDPR Art. 33",
    "HIPAA \u00a7 164.308",
    "SOC 2 CC7.2-CC7.4",
    "ISO 27001 A.16.1.6",
    "NIST SP 800-61",
]

[phrases]
require = [
    "require_containment_verified",
    "require_incident_closed",
    "require_incident_declared",
    "require_root_cause_identified",
]

verify = [
    "verify_containment_verified",
    "verify_root_cause_identified",
]

[schemas]
types = [
    "ContainmentStatus",
    "ContainmentVerificationStatus",
    "IncidentStatus",
    "RootCauseStatus",
]

[dependencies]
packages = []
core = ["canon.enforcement", "canon.db"]
