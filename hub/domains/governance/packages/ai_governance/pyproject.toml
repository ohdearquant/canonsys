[project]
name = "canon-vocab-ai-governance"
version = "2026.01.0"
description = "AI/ML model governance, bias assessment, and human review requirements"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@canonsys.com" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_ai_governance"]
