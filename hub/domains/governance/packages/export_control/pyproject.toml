[project]
name = "canon-vocab-export-control"
version = "2026.01.0"
description = "ITAR, EAR, OFAC screening, BIS licensing, and destination country validation."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@lionagi.ai" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_export_control"]
