[project]
name = "canon-vocab-notice"
version = "2026.01.0"
description = "Formal compliance notice delivery, acknowledgment tracking, and waiting period management."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@lionagi.ai" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_notice"]
