[project]
name = "canon-vocab-policy"
version = "2026.01.0"
description = "Policy definition, adapter creation, release lifecycle, evaluation, resolution, conditional evaluation, and exception management."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@canonsys.com" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_policy"]
