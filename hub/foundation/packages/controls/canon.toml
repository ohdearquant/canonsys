# Canon Vocabulary Package Manifest

[package]
name = "controls"
version = "2026.01"
description = "Control assessment, exploitability checks, logging coverage, and sanitization verification."

[package.regulatory]
basis = [
    "SOX Section 404",
    "SOC 2 CC4.1",
    "SOC 2 CC6.1",
    "SOC 2 CC6.7",
    "SOC 2 CC7.1",
    "SOC 2 CC7.2",
    "ISO 27001 A.12.4",
    "ISO 27001 A.12.6.1",
    "ISO 27001 A.18.2.1",
    "CISA BOD 22-01",
    "NYC LL144",
    "GDPR Article 32",
    "NIST SP 800-88",
]

[phrases]
verify = [
    "verify_required_controls_for_tool",
    "verify_sanitization_profile",
]

derive = [
    "derive_compensating_logging_coverage",
    "derive_control_equivalence_score",
]

action = [
    "assess_control_coverage",
    "check_exploitability_status",
]

[schemas]
types = [
    "ControlCoverageResult",
    "ControlEquivalenceResult",
    "ExploitabilityResult",
    "LoggingCoverageResult",
    "SanitizationResult",
    "ToolControlResult",
]

[dependencies]
packages = []
core = ["canon.enforcement", "canon.db"]
