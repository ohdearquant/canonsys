[project]
name = "canon-vocab-core"
version = "2026.01.0"
description = "Core compliance primitives: audit verification, charter management, break glass, and SOX review."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@lionagi.ai" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_core"]
