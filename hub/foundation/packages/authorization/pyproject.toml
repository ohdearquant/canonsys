[project]
name = "canon-vocab-authorization"
version = "2026.01.0"
description = "Access control, role-based approval chains, dual approval, delegation, time-bounded access, and segregation of duties."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@canonsys.com" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_authorization"]
