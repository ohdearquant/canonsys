[project]
name = "canon-vocab-timing"
version = "2026.01.0"
description = "Timing gates, business day computation, notice delivery, waiting period management, SLA verification, and timing constraint queries."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@lionagi.ai" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/canon_vocab_timing"]
