    "BindSurfaceResult",
    "Charter",
    "CharterContent",
    "CharterStatus",
    "CharterSurfaceBinding",
    "CharterSurfaceBindingContent",
    "CreateCharterResult",
    "DecisionResult",
    "SurfaceBinding",
]

[dependencies]
packages = []
core = ["canon.enforcement", "canon.db"]
