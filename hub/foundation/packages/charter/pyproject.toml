version = "2026.01.0"
description = "Charter lifecycle management, surface binding, and decision evaluation."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ocean (HaiyangLi)", email = "ocean@lionagi.ai" }]

dependencies = [
    "canon",
]

[build-system]
requires = ["hatchling"]
