# CanonSys Ruff Configuration
# https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 100
src = ["libs/canon/src", "libs/kron/src", "hub"]

# Exclude common non-source directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    ".ruff_cache",
    "node_modules",
]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "RUF",    # ruff-specific rules
    "PERF",   # perflint
    "FURB",   # refurb
    "LOG",    # flake8-logging
    "G",      # flake8-logging-format
]

ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function calls in argument defaults (FastAPI Depends)
    "B904",   # raise without from in except
    "ARG001", # unused function argument (common in protocols/ABCs)
    "ARG002", # unused method argument
    "SIM108", # ternary instead of if-else (readability)
]

# Allow fix for all enabled rules (when `--fix` is provided)
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"tests/**/*.py" = [
    "ARG",    # unused arguments OK in tests
    "S101",   # assert OK in tests
]
"**/migrations/**/*.py" = [
    "ALL",    # migrations are auto-generated
]

[lint.isort]
known-first-party = ["canon", "kron"]
force-single-line = false
combine-as-imports = true
split-on-trailing-comma = true

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]

[lint.flake8-type-checking]
strict = true
runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 80
