[project]
name = "canonsys-workspace"
version = "0.0.0"
description = "CanonSys — agent governance framework (policy DSL + runtime enforcement)"
requires-python = ">=3.11"

[tool.uv.workspace]
members = [
    "libs/*",
    "hub/foundation/packages/*",
    "hub/domains/corporate/packages/*",
    "hub/domains/governance/packages/*",
    "hub/catalogs",
]

[tool.uv.sources]
kron = { workspace = true }
canon = { workspace = true }
canon-catalogs = { workspace = true }
canon-vocab-ai-governance = { workspace = true }
