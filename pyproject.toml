canon-vocab-data-protection = { workspace = true }
canon-vocab-deployment = { workspace = true }
canon-vocab-evidence = { workspace = true }
canon-vocab-export-control = { workspace = true }
canon-vocab-freshness = { workspace = true }
canon-vocab-identity = { workspace = true }
